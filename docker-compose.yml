services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pentraai-backend
    env_file:
      - ./backend/.env
    environment:
      REQUIRE_REPORT_RENDERER: "true"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, json; d=json.loads(urllib.request.urlopen('http://127.0.0.1:8000/health').read().decode()); import sys; sys.exit(0 if d.get('report_renderer',{}).get('ready') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
